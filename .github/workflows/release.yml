name: Release & Deploy

# Push a tag like v1.0.0 → run the full CI gate, build the Windows client,
# cut a GitHub Release (auto-generated notes + apexai.exe attached), and
# deploy the new code to the production server.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write          # needed to create the Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Reuse the exact same checks as every push — no release ships untested code.
  test:
    uses: ./.github/workflows/ci.yml

  build-exe:
    name: Build apexai.exe (win-x64)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Publish self-contained single-file
        working-directory: client
        run: >
          dotnet publish src/ApexAI.Cli/ApexAI.Cli.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish/win-x64
      - name: Tag the binary with the version
        working-directory: client/publish/win-x64
        run: cp apexai.exe "apexai-${{ github.ref_name }}.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: apexai-exe
          path: client/publish/win-x64/apexai-*.exe
          if-no-files-found: error

  release:
    name: GitHub Release + notes
    needs: build-exe
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: apexai-exe
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/apexai-*.exe
          fail_on_unmatched_files: true

  deploy:
    name: Deploy to server
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Rsync code to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes" \
            --exclude '.git/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '*/bin/' \
            --exclude '*/obj/' \
            --exclude '__pycache__/' \
            --exclude '*.sqlite3' \
            --exclude '.env' \
            --exclude 'web/.env.local' \
            --exclude 'client/publish/' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/apexai/"
      - name: Build & restart stack on server
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=240 \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'bash /opt/apexai/infra/deploy.sh'
